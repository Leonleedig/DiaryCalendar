<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#d81b24" id="meta-theme-color">
  <title>法心日知</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.6.12/lunar.min.js"></script>
  
  <style>
    /* --- CSS 變數：分為 A、B、C 三組主題色 --- */
    :root {
      --theme-bg: #8B5A2B;
      --theme-a: #0d47a1; /* A組：日期、紀年、農曆 (預設經典藍) */
      --theme-b: #d81b24; /* B組：主標題、文章區 (預設經典紅) */
      --theme-c: #2e7d32; /* C組：節氣、宜忌 (預設長青綠) */
      --theme-paper: #fdfdfd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body {
      background-color: var(--theme-bg);
      background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px);
      display: flex; flex-direction: column; 
      min-height: 100vh; min-height: 100dvh; /* ★ 解除高度鎖定，改為最小高度，讓超出畫面的內容可以原生上下滑動 */
      font-family: "BiauKai", "DFKai-SB", "楷體", "標楷體", "PMingLiU", serif;
      -webkit-user-select: none; user-select: none; 
    }
    input, textarea, select, .footer-info { -webkit-user-select: auto; user-select: auto; }

    /* --- 主視圖區 --- */
    .main-view {
      flex: 1; display: flex; justify-content: center; align-items: flex-start; /* ★ 允許子元素隨內容自然長高 */
      padding: 15px; position: relative; cursor: grab; 
    }
    .main-view:active { cursor: grabbing; }

    .calendar-wrapper {
      width: 100%; max-width: 450px; background: var(--theme-paper);
      border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      position: relative; margin: 0 auto; display: flex; flex-direction: column; 
      min-height: calc(100vh - 30px); /* ★ 保持初始滿版，但不鎖死最大高度 */
    }

    .binding {
      position: absolute; top: 0; left: 0; width: 100%; height: 20px;
      display: flex; justify-content: space-around; align-items: center; z-index: 20;
    }
    .hole {
      width: 16px; height: 16px; background-color: #333; border-radius: 50%;
      border: 2px solid #e0e0e0; box-shadow: inset 0 3px 5px rgba(0,0,0,0.8); position: relative;
    }

    /* B組：頂部主標題 */
    .header {
      background-color: var(--theme-b); color: #f7d23d;
      text-align: center; padding: 30px 10px 15px; font-size: clamp(28px, 8vw, 36px); 
      font-weight: bold; letter-spacing: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); 
      border-bottom: 3px solid rgba(0,0,0,0.2); border-radius: 8px 8px 0 0; 
      position: relative; cursor: pointer; z-index: 10; flex-shrink: 0; 
    }
    .header::after {
      display: none; /* 隱藏「點擊載入文本」提示 */
    }

    /* ★ 頂部設定按鈕 (純字元齒輪) */
    .header-settings-btn {
      position: absolute; top: 20px; right: 15px;
      font-size: 24px; color: #ffffff; cursor: pointer; 
      text-shadow: none; transition: transform 0.2s, opacity 0.2s;
      opacity: 0.8; font-family: sans-serif;
    }
    .header-settings-btn:hover { opacity: 1; }
    .header-settings-btn:active { transform: scale(0.8); }

    .paper { 
      padding: 15px; position: relative; border-radius: 0 0 8px 8px;
      background: var(--theme-paper); will-change: transform, opacity;
      flex: 1; display: flex; flex-direction: column;
      /* ★ 移除了 overflow-y 限制，讓內容直接撐開整張紙 */
    }

    .top-info, .main-grid, .memo-box { flex-shrink: 0; }

    /* A組：西元年月、歲次干支 */
    .top-info {
      display: flex; justify-content: space-between; align-items: center;
      color: var(--theme-a); font-weight: bold; 
      font-size: clamp(16px, 4vw, 20px); /* ★ 動態縮放 */
      border-bottom: 2px solid var(--theme-a); padding-bottom: 5px; margin-bottom: 15px;
    }

    .btn-small-today {
      background-color: var(--theme-a); color: white; border: none; 
      padding: 4px 10px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;
      transition: opacity 0.2s;
    }
    .btn-small-today:active { opacity: 0.7; }

    .date-dropdown {
      position: absolute; top: 110%; left: 0; background: #fff; 
      border: 2px solid var(--theme-a); padding: 12px; border-radius: 8px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: none; z-index: 100; 
      flex-direction: row; gap: 8px; align-items: center; width: max-content;
    }
    .date-dropdown.show { display: flex; animation: fadeIn 0.2s ease-out; }
    .date-dropdown select { 
      padding: 6px; font-size: 16px; border: 1px solid #ccc; 
      border-radius: 4px; background: #f9f9f9; cursor: pointer; font-family: inherit;
    }

    .main-grid {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 5px; margin-bottom: 15px;
    }

    /* A組：左側農曆 */
    .left-lunar { 
      writing-mode: vertical-rl; text-orientation: upright; 
      color: var(--theme-a); font-weight: bold; 
      font-size: clamp(20px, min(6vw, 3.5dvh), 26px); /* ★ 雙軸限制：同時看寬度與高度，避免太高或太寬 */
      letter-spacing: 3px;
      display: flex; flex-direction: column; gap: 12px; align-items: flex-start;
      transform: translateX(-1.5em); 
    }
    
    /* C組：右側節氣 */
    .right-solar { 
      writing-mode: vertical-rl; text-orientation: upright; 
      color: var(--theme-c); font-weight: bold; 
      font-size: clamp(20px, min(6vw, 3.5dvh), 26px); /* ★ 雙軸限制：同時看寬度與高度 */
      letter-spacing: 3px;
      display: flex; flex-direction: column; gap: 12px; align-items: flex-start;
      transform: translateX(-1.5em); 
    }

    .v-col { display: inline-flex; align-items: center; }
    
    /* A組："農曆"背景色塊 */
    .lunar-badge {
      background-color: var(--theme-a); color: white; padding: 6px; 
      border-radius: 4px; margin-bottom: 10px; font-size: 20px;
    }
    /* C組："節氣"背景色塊 */
    .solar-badge { background-color: var(--theme-c); } 

    /* A組：中央數字與星期 */
    .center-date { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .big-number {
      /* ★ 核心防呆：字體大小取 (35vw寬度 或 20dvh高度) 中比較小的那個，並限制在 80px ~ 180px 之間 */
      font-size: clamp(80px, min(35vw, 20dvh), 180px); 
      font-family: Arial, sans-serif; font-weight: 900;
      color: var(--theme-a); line-height: 0.85; margin: 5px 0; letter-spacing: -5px;
    }
    .weekday {
      font-size: clamp(20px, min(6vw, 4dvh), 30px); /* ★ 動態縮放 */
      color: white; background-color: var(--theme-a);
      width: 100%; text-align: center; padding: 8px 0; border-radius: 6px; font-weight: bold; letter-spacing: 5px;
    }

    /* 備忘錄 (配合A組日期資訊) */
    .memo-box {
      border: 2px dashed var(--theme-a); border-radius: 6px; display: flex;
      margin-bottom: 15px; background: rgba(255,255,255,0.6); align-items: stretch;
      overflow: hidden;
      min-height: 60px; /* ★ 確保備忘錄即使被擠壓也保有基本高度 */
    }
    .memo-title {
      background-color: var(--theme-a); color: white; padding: 10px 8px;
      font-weight: bold; display: flex; align-items: center; justify-content: center;
      writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 2px; font-size: 16px;
      cursor: pointer; transition: background-color 0.2s;
    }
    .memo-title:active { opacity: 0.8; }
    
    .memo-content {
      padding: 10px; flex: 2; display: flex; align-items: center; position: relative;
    }
    .memo-content div { font-size: 18px; font-weight: bold; color: #333; line-height: 1.5; white-space: pre-wrap; width: 100%; } /* ★ 移除內部高度鎖定 */
    .memo-content textarea {
      width: 100%; font-size: 16px; border: 1px solid var(--theme-a); 
      border-radius: 4px; padding: 5px; resize: none; font-family: inherit;
      overflow: hidden; /* ★ 隱藏捲軸，配合後續的 JS 自動長高機制 */
    }

    /* C組：橫式宜忌區塊 */
    .memo-almanac {
      flex: 1.2; border-left: 2px dashed var(--theme-c); padding: 8px 10px;
      display: flex; flex-direction: column; justify-content: center; gap: 10px;
    }
    .h-almanac-item { display: flex; align-items: flex-start; gap: 6px; font-size: 15px; color: var(--theme-c); font-weight: bold; }
    .h-icon {
      background-color: var(--theme-c); color: white; padding: 2px 6px;
      border-radius: 4px; font-size: 14px; white-space: nowrap; flex-shrink: 0; line-height: 1.2;
    }
    .h-icon.icon-ji { background-color: #333; }
    .h-text { line-height: 1.3; }

    /* B組：文章編輯區與內容 */
    .article-container {
      display: flex; flex-direction: column; flex: 1; min-height: 0; margin-bottom: 5px;
    }
    .article-header-btn {
      background-color: var(--theme-b); color: white;
      text-align: center; padding: 6px 10px; font-size: 16px; font-weight: bold;
      letter-spacing: 2px; cursor: pointer; border-radius: 6px 6px 0 0;
      flex-shrink: 0; transition: opacity 0.2s;
    }
    .article-header-btn:active { opacity: 0.8; }

    .footer-wrapper { position: relative; flex: 1; display: flex; min-height: 0; }
    .footer {
      border: 3px solid var(--theme-b); border-top: none; border-radius: 0 0 6px 6px; 
      padding: 15px; color: var(--theme-b); transition: all 0.3s; 
      background: #fff; flex: 1; overflow-x: auto; 
      display: block; cursor: auto; position: relative;
      min-height: 250px; /* ★ 給予舒適的預設高度，但允許無限向下長高 */
    }
    .footer::-webkit-scrollbar { height: 6px; }
    .footer::-webkit-scrollbar-thumb { background-color: var(--theme-b); border-radius: 4px; opacity: 0.5; }
    .footer::-webkit-scrollbar-track { background-color: #f0f0f0; border-radius: 4px; }
    
    .footer-info { 
      font-size: 18px; line-height: 2; font-weight: bold; white-space: pre-wrap; 
      writing-mode: vertical-rl; text-orientation: upright; text-align: left;
      min-height: 200px; /* ★ 確保直排閱讀區有基本高度 */
    }

    /* ★ 目錄連結專用樣式 */
    .toc-item {
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dashed;
      text-underline-position: under right;
      transition: opacity 0.2s;
    }
    .toc-item:active { opacity: 0.5; }

    #edit-article {
      width: 100%; resize: none; border: 1px dashed var(--theme-b);
      border-radius: 4px; padding: 10px; font-size: 18px; font-family: inherit;
      writing-mode: horizontal-tb; overflow: hidden; min-height: 200px; /* ★ 隱藏內部捲軸，允許自動向下長高 */
    }

    .scroll-hint {
      position: absolute; left: 3px; top: 3px; bottom: 3px; width: 40px;
      background: linear-gradient(to right, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
      display: flex; align-items: center; justify-content: flex-start; padding-left: 8px;
      color: var(--theme-b); font-size: 24px; pointer-events: none; opacity: 0; 
      transition: opacity 0.3s ease; border-radius: 4px 0 0 4px; z-index: 10;
    }

    .sync-status {
      position: absolute; top: 12px; left: 12px; z-index: 50; 
      font-size: 13px; color: rgba(255,255,255,0.9); font-weight: bold;
      background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 20px;
      display: flex; align-items: center; gap: 4px; transition: opacity 0.5s;
      pointer-events: none; 
    }

    .anim-swipe-left { animation: swipeLeft 0.35s forwards ease-in; }
    .anim-swipe-right { animation: swipeRight 0.35s forwards ease-in; }
    .anim-fade-in { animation: fadeIn 0.3s forwards ease-out; }
    @keyframes swipeLeft { 0% { transform: translateX(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(-150px) translateY(30px) rotate(-5deg); opacity: 0; } }
    @keyframes swipeRight { 0% { transform: translateX(0) rotate(0deg); opacity: 1; } 100% { transform: translateX(150px) translateY(30px) rotate(5deg); opacity: 0; } }
    @keyframes fadeIn { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center;
      z-index: 999; opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.show { display: flex; opacity: 1; }
    .modal-content {
      background: #fff; width: 90%; max-width: 400px; padding: 25px;
      border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-family: sans-serif;
    }
    .modal-title { font-size: 24px; margin-bottom: 20px; font-weight: bold; text-align: center; color: #333; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 18px; font-weight: bold; color: #555; }
    .form-control { width: 100%; padding: 12px; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; }
    
    /* 顏色設定器專屬排版 */
    .color-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .color-row input[type="color"] {
      width: 45px; height: 45px; padding: 0; border: 2px solid #ccc; 
      border-radius: 8px; cursor: pointer;
    }
    .color-row span { font-size: 16px; font-weight: bold; color: #333; }

    .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
    .modal-btn { flex: 1; padding: 15px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    .btn-cancel { background: #e0e0e0; color: #333; }
    .btn-save { background: var(--theme-a); color: white; } /* 儲存按鈕使用A組顏色 */
  </style>
</head>
<body>

  <div class="main-view" id="touch-area">
    <div class="calendar-wrapper" id="calendar-card">
      
      <div class="sync-status" id="sync-status">☁️ 準備連線...</div>

      <div class="binding">
        <div class="hole"></div><div class="hole"></div><div class="hole"></div>
      </div>
      
      <input type="file" id="txt-uploader" accept=".txt" style="display: none;" onchange="window.handleFileUpload(event)">

      <div class="header" onclick="document.getElementById('txt-uploader').click()" title="點擊上傳專屬文本檔">
        <span id="display-title">平安喜樂</span>
        <div class="header-settings-btn" onclick="window.openSettings(); event.stopPropagation();" title="設定">⚙︎</div>
      </div>

      <div class="paper" id="paper-page">
        <div class="top-info">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="position: relative; display: inline-flex; align-items: center;">
              <span id="roc-year" style="border-bottom: 1px dashed var(--theme-a); padding-bottom: 2px; cursor: pointer;" title="點擊跳轉日期" onclick="window.toggleDateDropdown()">--年 ▾</span>
              
              <div class="date-dropdown" id="date-dropdown">
                <select id="jump-year" onchange="window.updateDays()"></select>
                <select id="jump-month" onchange="window.updateDays()"></select>
                <select id="jump-day"></select>
                <button class="btn-small-today" onclick="window.executeJump()">前往</button>
              </div>
            </div>
            <button class="btn-small-today" id="btn-today-nav" onclick="window.goToToday()">回到今天</button>
          </div>
          <div>
            <span id="gregorian-year-month">西元----年-月</span>
            <span id="lunar-year-text" style="margin-left: 5px;">歲次--</span>
          </div>
        </div>

        <div class="main-grid">
          <div class="left-lunar">
            <div class="v-col">
              <span class="lunar-badge">農曆</span>
              <span id="lunar-date">--月--日</span>
            </div>
          </div>
          <div class="center-date">
            <div class="big-number" id="gregorian-date">--</div>
            <div class="weekday" id="weekday">星期-</div>
          </div>
          <div class="right-solar">
            <div class="v-col">
              <span class="lunar-badge solar-badge">節氣</span>
              <span id="solar-term">--</span>
            </div>
          </div>
        </div>

        <div class="memo-box">
          <div class="memo-title" onclick="window.toggleMemoEdit()" title="點擊切換編輯模式">備忘錄 ✎</div>
          <div class="memo-content">
            <div id="display-memo">長庚醫院回診：週四下午\n兒子電話：0912-345-678</div>
            <textarea id="edit-memo" style="display: none;"></textarea>
          </div>
          <div class="memo-almanac">
            <div class="h-almanac-item"><span class="h-icon icon-yi">宜</span> <span id="almanac-yi" class="h-text">加載中</span></div>
            <div class="h-almanac-item"><span class="h-icon icon-ji">忌</span> <span id="almanac-ji" class="h-text">加載中</span></div>
          </div>
        </div>

        <div class="article-container">
          <div class="article-header-btn" id="btn-article-edit" onclick="window.toggleArticleEdit()" title="點擊切換文章編輯模式">
            日知錄 ✎
          </div>
          <div class="footer-wrapper">
            <div class="footer" id="article-footer" onscroll="window.updateScrollHint()">
              <div class="footer-info" id="display-footer">文章載入中...</div>
              <textarea id="edit-article" style="display: none;"></textarea>
            </div>
            <div class="scroll-hint" id="scroll-hint-left">◀</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
      <div class="modal-title">日曆客製化設定</div>
      
      <div class="form-group">
        <label>自訂配色</label>
        <div class="color-row">
          <input type="color" id="input-theme-a" value="#0d47a1">
          <span>A組 (日期、紀年、農曆)</span>
        </div>
        <div class="color-row">
          <input type="color" id="input-theme-b" value="#d81b24">
          <span>B組 (標題、日知錄)</span>
        </div>
        <div class="color-row">
          <input type="color" id="input-theme-c" value="#2e7d32">
          <span>C組 (節氣、宜忌)</span>
        </div>
      </div>

      <div class="form-group">
        <label>頂部標題</label>
        <input type="text" id="input-title" class="form-control" maxlength="20">
      </div>
      <div class="form-group">
        <label>新建備忘錄時的預設底稿</label>
        <textarea id="input-footer" class="form-control" rows="3"></textarea>
      </div>

      <!-- ★ 更新：鎖定 UID 欄位，強制顯示預設測試 ID，並停用按鈕 -->
      <div class="form-group">
        <label>您的專屬雲端 ID (目前已鎖定綁定)</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="display-uid" class="form-control" style="background: #e0e0e0; font-size: 14px; color: #666; flex: 1; cursor: not-allowed;" readonly value="yXJkYmVPRnNIQU01b3gEBc3Lk853">
          <button style="background: #999; color: white; border: none; border-radius: 6px; padding: 0 15px; font-weight: bold; cursor: not-allowed; font-size: 16px;" disabled>鎖定中</button>
        </div>
        <div style="font-size: 12px; color: #666; margin-top: 4px; line-height: 1.4;">
          ※ 開發測試階段，已強制綁定此 ID 讀取與寫入資料。
        </div>
      </div>

      <div class="modal-actions">
        <button class="modal-btn btn-cancel" onclick="window.closeSettings()">取消</button>
        <button class="modal-btn btn-save" onclick="window.saveSettings()">儲存設定</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8yZbscIqVwntcQxcAYtJknvNPAzf0emw",
      authDomain: "diarycalender.firebaseapp.com",
      projectId: "diarycalender",
      storageBucket: "diarycalender.firebasestorage.app",
      messagingSenderId: "841129434824",
      appId: "1:841129434824:web:1ec9046915c8beff108ffd",
      measurementId: "G-RK1C4NNE4F"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // ★ 宣告固定的測試 UID
    const FIXED_UID = 'yXJkYmVPRnNIQU01b3gEBc3Lk853';
    let userId = FIXED_UID; 

    let currentDate = new Date();
    let isAnimating = false;
    let isEditingMemo = false; 
    let isEditingArticle = false; 
    
    let appSettings = {

    async function fetchCloudData() {
      if (!userId) return;
      updateSyncStatus('☁️ 同步中...');
      try {
        const settingsRef = doc(db, "users", userId, "settings", "profile");
        const articlesRef = doc(db, "users", userId, "data", "articles");
        const memosRef = doc(db, "users", userId, "data", "memos");

        const [settingsSnap, articlesSnap, memosSnap] = await Promise.all([getDoc(settingsRef), getDoc(articlesRef), getDoc(memosRef)]);
        
        let hasChanges = false;
        if (settingsSnap.exists()) { 
          const cloudSettings = settingsSnap.data();
          if(cloudSettings.themeColor && !cloudSettings.themeB) cloudSettings.themeB = cloudSettings.themeColor;
          appSettings = { ...appSettings, ...cloudSettings }; 
          hasChanges = true; 
        }
        if (articlesSnap.exists()) { customArticles = articlesSnap.data().list || {}; hasChanges = true; }
        if (memosSnap.exists()) { customMemos = memosSnap.data().list || {}; hasChanges = true; } 

        if (hasChanges) {
          localStorage.setItem('calendarSettings', JSON.stringify(appSettings));
          localStorage.setItem('calendarArticles', JSON.stringify(customArticles));
          localStorage.setItem('calendarMemos', JSON.stringify(customMemos));
          applySettings(); 
        }
        updateSyncStatus('☁️ 已同步', 2000); 
      } catch (error) {
        if (error.message && error.message.includes('offline')) updateSyncStatus('☁️ 離線模式', 3000);
        else updateSyncStatus('☁️ 同步失敗', 3000);
      }
    }

    async function saveToCloud() {
      localStorage.setItem('calendarSettings', JSON.stringify(appSettings));
      localStorage.setItem('calendarArticles', JSON.stringify(customArticles));
      localStorage.setItem('calendarMemos', JSON.stringify(customMemos)); 

      if (!userId) return;
      updateSyncStatus('☁️ 儲存中...');
      try {
        await Promise.all([
          setDoc(doc(db, "users", userId, "settings", "profile"), appSettings, { merge: true }),
          setDoc(doc(db, "users", userId, "data", "articles"), { list: customArticles }, { merge: true }),
          setDoc(doc(db, "users", userId, "data", "memos"), { list: customMemos }, { merge: true })
        ]);
        updateSyncStatus('☁️ 已儲存', 2000);
      } catch (error) {
        if (error.message && error.message.includes('offline')) updateSyncStatus('☁️ 儲存於本機 (離線)', 3000);
        else updateSyncStatus('☁️ 雲端儲存失敗', 3000);
      }
    }

    let touchStartX = 0, touchEndX = 0, touchStartY = 0, touchEndY = 0, isDragging = false;
    function handleGesture() {
      const deltaX = touchEndX - touchStartX;
      const deltaY = touchEndY - touchStartY;
      if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
        changeDay(deltaX < 0 ? -1 : 1);
      }
    }

    const touchArea = document.getElementById('touch-area');
    touchArea.addEventListener('touchstart', e => {
      if (e.target.closest('#article-footer') || e.target.closest('.memo-content')) return;
      touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});
    touchArea.addEventListener('touchend', e => {
      if (e.target.closest('#article-footer') || e.target.closest('.memo-content')) return;
      touchEndX = e.changedTouches[0].screenX; touchEndY = e.changedTouches[0].screenY;
      handleGesture();
    }, {passive: true});
    touchArea.addEventListener('mousedown', e => {
      if (e.target.closest('#article-footer') || e.target.closest('button') || e.target.closest('.header') || e.target.closest('.memo-box') || e.target.closest('.date-dropdown') || e.target.closest('select')) return;
      isDragging = true; touchStartX = e.screenX; touchStartY = e.screenY;
    });
    touchArea.addEventListener('mouseup', e => {
      if (!isDragging || e.target.closest('#article-footer')) return;
      isDragging = false; touchEndX = e.screenX; touchEndY = e.screenY;
      handleGesture();
    });
    touchArea.addEventListener('mouseleave', e => {
      if (isDragging) { isDragging = false; touchEndX = e.screenX; touchEndY = e.screenY; handleGesture(); }
    });

    function changeDay(offset) {
      if (isAnimating) return;
      window.forceSaveEdits(); 
      isAnimating = true;
      const paper = document.getElementById('paper-page');

        paper.classList.remove('anim-swipe-left', 'anim-swipe-right');

    window.handleFileUpload = function(event) {
      const file = event.target.files[0];
      if (!file) return;
      const fileName = file.name.replace(/\.[^/.]+$/, "");
      const reader = new FileReader();
      reader.onload = function(e) { parseTextData(e.target.result, fileName); };
      reader.readAsText(file);
      event.target.value = ''; 
    };

    function parseTextData(text, fileName) {
      const regex = /【([^】]+)】-(\d{4})\.(\d{1,2})\.(\d{1,2})\.([A-Za-z]{2})-([\s\S]*?)(?=(?:【|$))/g;
      let match, count = 0;
      let touchedDates = new Set(); // ★ 新增：用來記錄這次上傳已經處理過的日期

      while ((match = regex.exec(text)) !== null) {
        const title = match[1].trim(), year = match[2];
        const month = match[3].padStart(2, '0'), day = match[4].padStart(2, '0');
        const timeOfDay = match[5].toUpperCase(), content = match[6].trim();
        const dateStr = `${year}${month}${day}`; 
        
        // ★ 修改邏輯：選項 A (遇到重複日期直接覆蓋替換)
        if (!touchedDates.has(dateStr)) {
          // 這次上傳「初次」遇到該日期：直接建立/覆蓋，抹除雲端原有的舊資料
          customArticles[dateStr] = { title, content };
          touchedDates.add(dateStr);
        } else {
          // 這次上傳「再次」遇到該日期（例如同一天的 PM 內容）：將文字附加在下方
          customArticles[dateStr].content += `\n\n[${timeOfDay}]\n${content}`; 
        }
        count++;
      }
      
      if (count > 0) {
        appSettings.title = fileName || appSettings.title;
        document.getElementById('display-title').innerText = appSettings.title;
        saveToCloud();
        alert(`解析成功！已載入 ${count} 段專屬文章並同步至雲端。\n（與 txt 檔案重複的日期已自動更新為最新內容）`);
        renderCalendar(currentDate); 
      } else {
        alert('找不到符合格式的文章！請檢查 txt 檔是否符合：\n【標題】-YYYY.M.D.AM-內容');
      }
    }

    window.updateScrollHint = function() {
      const container = document.getElementById('article-footer');
      const hint = document.getElementById('scroll-hint-left');
      const content = document.getElementById('display-footer');
      if (isEditingArticle) return; 

      if (container.scrollWidth > container.clientWidth + 5) {
        const containerRect = container.getBoundingClientRect();
        const contentRect = content.getBoundingClientRect();
        if (contentRect.left >= containerRect.left - 5) { hint.style.opacity = '0'; } 
        else { hint.style.opacity = '1'; }
      } else { hint.style.opacity = '0'; }
    };

    function renderCalendar(dateObj) {
      const year = dateObj.getFullYear(), month = dateObj.getMonth() + 1, date = dateObj.getDate();
      const day = dateObj.getDay(), weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
      const dateKey = getDateKey(dateObj);

      const todayDate = new Date();
      const isToday = (year === todayDate.getFullYear() && month === (todayDate.getMonth() + 1) && date === todayDate.getDate());
      document.getElementById('btn-today-nav').style.display = isToday ? 'none' : 'block';

      document.getElementById('roc-year').innerText = `民國${year - 1911}年 ▾`;
      document.getElementById('gregorian-year-month').innerText = `西元${year}年${month}月`;
      document.getElementById('gregorian-date').innerText = date;
      document.getElementById('weekday').innerText = weekdays[day];

      const lunar = Lunar.fromDate(dateObj);
      const yiArr = lunar.getDayYi().map(toTC);
      const jiArr = lunar.getDayJi().map(toTC);
      document.getElementById('almanac-yi').innerText = yiArr.length > 0 ? yiArr.slice(0,3).join(' ') : '無';
      document.getElementById('almanac-ji').innerText = jiArr.length > 0 ? jiArr.slice(0,3).join(' ') : '諸事不宜';
      
      const currentJieQi = lunar.getPrevJieQi(true);
      document.getElementById('solar-term').innerText = currentJieQi ? toTC(currentJieQi.getName()) : '--';
      
      document.getElementById('lunar-year-text').innerText = `歲次${lunar.getYearInGanZhi()}`;
      document.getElementById('lunar-date').innerText = `${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;

      if (!isEditingMemo) {
        document.getElementById('display-memo').innerText = customMemos[dateKey] !== undefined ? customMemos[dateKey] : appSettings.footer;
      }

      const footerEl = document.getElementById('display-footer');
      const footerContainer = document.getElementById('article-footer');

      // ★ 修改：日知錄遇缺補目錄 (文美文集)
      if (customArticles[dateKey]) {
        let text = `【${customArticles[dateKey].title}】`;
        if (customArticles[dateKey].content) {
          text += `\n\n${customArticles[dateKey].content}`;
        }
        footerEl.innerText = text;
      } else {
        // 抓取所有雲端文章的金鑰並由新到舊排序
        const articleKeys = Object.keys(customArticles).sort((a, b) => b.localeCompare(a));
        
        if (articleKeys.length > 0) {
          let tocHTML = `《 文美文集 》目錄\n\n`;
          let items = articleKeys.map(k => {
            const y = k.substring(0, 4);
            const m = parseInt(k.substring(4, 6), 10);
            const d = parseInt(k.substring(6, 8), 10);
            const title = customArticles[k].title || '無標題';
            // 替換危險字元，確保插入 HTML 的安全性
            const safeTitle = title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // 使用帶有虛線的 span 來做成可點擊的目錄條目
            return `<span class="toc-item" onclick="window.jumpToDiaryDate('${k}')">【${safeTitle}】${y}.${m}.${d}</span>`;
          });
          tocHTML += items.join('\n');
          // 使用 innerHTML 以渲染 span 標籤，\n 會被外層的 white-space: pre-wrap 正常解析成換行
          footerEl.innerHTML = tocHTML;
        } else {
          footerEl.innerText = "《 文美文集 》\n\n目前尚無日知錄。\n點擊上方「日知錄 ✎」開始您的第一篇創作吧！";
        }
      }

      if (!isEditingArticle) {
        requestAnimationFrame(() => {
          footerContainer.scrollLeft = footerContainer.scrollWidth;
          if(footerContainer.scrollLeft === 0 && footerContainer.scrollWidth > footerContainer.clientWidth) {
            footerContainer.scrollLeft = 0; 
          }
          setTimeout(window.updateScrollHint, 50); 
        });
      }
    }

    function applySettings() {
      document.getElementById('display-title').innerText = appSettings.title;
      
      document.documentElement.style.setProperty('--theme-a', appSettings.themeA || '#0d47a1');
      document.documentElement.style.setProperty('--theme-b', appSettings.themeB || '#d81b24');
      document.documentElement.style.setProperty('--theme-c', appSettings.themeC || '#2e7d32');
      document.getElementById('meta-theme-color').content = appSettings.themeB || '#d81b24';
      
      renderCalendar(currentDate);
    }

    init();
  </script>
</body>
</html>
